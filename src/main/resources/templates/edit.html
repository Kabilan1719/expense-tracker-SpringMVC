<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Expense</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h3>Edit Expense</h3>

    <form th:action="@{/update}" method="post">

        <input type="hidden" name="id" th:value="${expense.id}">

        <div class="mb-3">
            <label>Date</label>
            <input type="date" name="date" class="form-control" th:value="${expense.date}">
        </div>

        <div class="mb-3">
            <label>Amount</label>
            <input type="number" name="amount" class="form-control" th:value="${expense.amount}">
        </div>

        <div class="mb-3">
            <label>Category</label>
            <input type="text" name="category" class="form-control" th:value="${expense.category}">
        </div>

        <div class="mb-3">
            <label>Type</label>
            <input type="text" name="type" class="form-control" th:value="${expense.type}">
        </div>

        <div class="mb-3">
            <label>Reference</label>
            <input type="text" name="reference" class="form-control" th:value="${expense.reference}">
        </div>

        <button class="btn btn-success">Update</button>
        <a href="/" class="btn btn-secondary">Cancel</a>

    </form>

</div>

</body>
</html>
