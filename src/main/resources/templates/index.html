<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Expense Tracker</title>

<link rel="stylesheet" href="/css/style.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


</head>

<body>

<div class="header">
    <div class="container" id="con">
        <nav class="nav-bar">
            <h1>EXPENSE TRACKER</h1>
            <h5 th:text="${username}">User</h5>
        </nav>
    </div>
</div>

<div class="expense">
  <div class="container">
    <div class="row">

      <div class="col-lg-3">
        <h5>Total Spend Amount:</h5>
        <p>Rs: <span th:text="${totalAmount}">0</span></p>
      </div>
	
	  <div class="col-lg-3">
		<h5 th:text="${period}"></h5>
		<p>Rs: <span th:text="${periodAmount}"></span></p>
	  </div>
	  <div class="col-lg-3">
		<h5 th:text="${category}"></h5>
		<p>Rs: <span th:text="${categoryAmount}"></span></p>
	  </div>
    </div>
  </div>
</div>

<div class="container mt-4">

<div class="d-flex gap-3">

<!-- TIME FILTER -->
<div class="dropdown">
  <button class="btn btn-success dropdown-toggle" data-bs-toggle="dropdown">
    Time Filter
  </button>
  <ul class="dropdown-menu">
	<li><a class="dropdown-item" th:href="@{/filter(days=0)}">Today</a></li>
    <li><a class="dropdown-item" th:href="@{/filter(days=365)}">Last Year</a></li>
    <li><a class="dropdown-item" th:href="@{/filter(days=180)}">Last 6 Months</a></li>
    <li><a class="dropdown-item" th:href="@{/filter(days=30)}">Last 1 Month</a></li>
    <li><a class="dropdown-item" th:href="@{/filter(days=7)}">Last Week</a></li>
  </ul>
</div>

<div class="dropdown">
  <button class="btn btn-success dropdown-toggle" data-bs-toggle="dropdown">
    Category Filter
  </button>
  <ul class="dropdown-menu">
    <li><a class="dropdown-item" th:href="@{/}">All</a></li>
    <li><a class="dropdown-item" th:href="@{/filter(category='Salary')}">Salary</a></li>
    <li><a class="dropdown-item" th:href="@{/filter(category='Travel')}">Travel</a></li>
    <li><a class="dropdown-item" th:href="@{/filter(category='Food')}">Food</a></li>
    <li><a class="dropdown-item" th:href="@{/filter(category='Medicine')}">Medicine</a></li>
  </ul>
</div>

<button class="btn btn-primary" onclick="showForm()">Add Expense</button>

</div>
</div>

<div class="container mt-4">

<table class="table table-bordered">
<thead>
<tr>
<th>S.no</th>
<th>Date</th>
<th>Amount</th>
<th>Category</th>
<th>Type</th>
<th>Reference</th>
<th>Action</th>
</tr>
</thead>

<tbody>
	<tr th:each="exp, i : ${expenses}" th:if="${exp != null}">

	    <td th:text="${i.index + 1}"></td>

	    <td th:text="${exp.date}"></td>
	    <td th:text="${exp.amount}"></td>
	    <td th:text="${exp.category}"></td>
	    <td th:text="${exp.type}"></td>
		<td th:text="${exp.reference}"></td>

	    <td>
	        <a th:href="@{/edit/{id}(id=${exp.id})}" class="btn btn-warning btn-sm">Edit</a>
	        <a th:href="@{/delete/{id}(id=${exp.id})}" 
	           class="btn btn-danger btn-sm"
	           onclick="return confirm('Are you sure?')">Delete</a>
	    </td>

	</tr>
</tbody>

</table>

</div>

<div class="container mt-4" id="formSection" style="display:none;">

<form action="/add" method="post">

    <div class="row">

        <div class="col-md-3">
            <input type="date" name="date" class="form-control" required>
        </div>

        <div class="col-md-2">
            <input type="number" name="amount" class="form-control" placeholder="Amount" required>
        </div>

        <div class="col-md-2">
            <input type="text" name="category" class="form-control" placeholder="Category" required>
        </div>

        <div class="col-md-2">
            <input type="text" name="type" class="form-control" placeholder="Type" required>
        </div>

        <div class="col-md-2">
            <input type="text" name="reference" class="form-control" placeholder="Reference">
        </div>

        <div class="col-md-1">
            <button class="btn btn-success">Add</button>
        </div>

    </div>

</form>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script th:inline="javascript">

function showForm() {
    document.getElementById("formSection").style.display = "block";
}

// Backend data
/*let expenses = [[${expenses}]];*/
let expenses = [];

let chart;
let isChartVisible = false;

function showChart() {
    let section = document.getElementById('chartSection');

    if (!isChartVisible) {
        section.style.display = "block";
        drawChart();
        isChartVisible = true;
    } else {
        section.style.display = "none";
        isChartVisible = false;
    }
}

function drawChart() {
    let totals = {};

    expenses.forEach(e => {
        totals[e.category] = (totals[e.category] || 0) + e.amount;
    });

    let ctx = document.getElementById('expenseChart');

    if (chart) chart.destroy();

    chart = new Chart(ctx, {
        type: 'pie',
        data: {
            labels: Object.keys(totals),
            datasets: [{
                data: Object.values(totals)
            }]
        }
    });
}

</script>

</body>
</html>
